# SonarCloud project configuration
# https://docs.sonarsource.com/sonarqube/latest/project-administration/analysis-parameters/

sonar.projectKey=Agustin-Perezz_next-scaffold
sonar.organization=general-organization
sonar.projectName=next-scaffold
sonar.projectDescription=Next.js (App Router) starter with base-ui, shadcn, Biome, and Playwright E2E.

# Source code layout
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Exclusions — generated/vendored/build output should not be analyzed
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/*.d.ts,\
  **/next-env.d.ts

# Test file patterns (counted as tests, not as production code)
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Coverage scope — routes/pages/actions/per-feature components (src/app/**) and
# hooks (src/hooks/**) are measured for coverage. src/components/** (shared UI
# primitives, presentational wrappers) and src/lib/** (utilities) are exercised
# through Playwright E2E, not unit coverage, so the team writes fewer unit tests
# and leans on E2E for those surfaces.
#
# Sonar has no coverage whitelist property: any source file absent from the LCOV
# report is counted as 0% covered unless it is listed here. This list is the
# complement of vitest.config.ts `coverage.include` — what is NOT instrumented
# by vitest MUST be excluded here, or it tanks the gate. Keep the two in
# lockstep. Adding a new top-level src/ directory (e.g. src/services/) requires
# a matching line here or it will tank the gate.
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/tests/**,\
  src/components/**,\
  src/lib/**,\
  src/sentry.client.config.ts,\
  src/sentry.edge.config.ts,\
  src/sentry.server.config.ts,\
  src/instrumentation.ts

# Coverage report — produced by `pnpm test:coverage` (Vitest + @vitest/coverage-istanbul).
# SonarJS (the JS/TS analyzer) ingests LCOV via this property.
sonar.javascript.lcov.reportPaths=./coverage/lcov.info

# Quality Gate is enforced via SonarCloud's GitHub PR decoration (project is bound to GitHub).
# The scanner does not poll the Quality Gate — SonarCloud posts it as a GitHub PR check instead.
# Enable branch protection on "SonarCloud Code Analysis" check to block merges on Quality Gate failure.